<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Locker Room - Efrei Rugby</title>
        <link rel="icon" type="image/png" href="rugbiere-logo.png" />
        <link rel="stylesheet" href="css/dashboard.css" />
    </head>
    <body>
        <div class="sidebar">
            <ul>
                <li onclick="window.location.href = '/app/dashboard.html'">
                    Dashboard
                </li>
                <li>My Profile</li>
                <li>Schedule</li>
                <li>Team Roster</li>
                <li class="active">Locker Room</li>
            </ul>
            <img id="logout-btn" src="logout-64.png" alt="Logout Logo" />
        </div>

        <div class="main-content">
            <div class="top-bar">
                <img src="rugbiere-logo.png" alt="Efrei Rugby Logo" />

                <div class="title-group">
                    <h1>The Locker Room</h1>
                    <h4>
                        Pictures by &copy;
                        <a href="https://efreipicturestudio.fr/"
                            >Efrei Pictures Studio</a
                        >
                    </h4>
                </div>

                <div style="width: 100px"></div>
            </div>

            <div id="photo-gallery" style="padding: 20px">
                <p id="loading-text">Loading the archives...</p>
            </div>

            <footer>
                <p>
                    Copyright &copy; 2026 Carl Excoffier / Efrei Rugby. All
                    Rights Reserved.
                </p>
            </footer>
        </div>
        <div id="lightbox">
            <div id="prev-btn" class="lightbox-btn">&#10094;</div>
            <img id="lightbox-img" src="" alt="Gallery" />
            <div id="next-btn" class="lightbox-btn">&#10095;</div>
            <span id="close-lightbox" class="lightbox-btn">&times;</span>
        </div>
        <script src="js/locker-room.js"></script>
    </body>
</html>
