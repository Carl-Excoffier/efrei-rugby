<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <base href="/app/" />
        <title>Schedule - Efrei Rugby</title>
        <link rel="icon" type="image/png" href="rugbiere-logo.png" />
        <link rel="stylesheet" href="css/global.css" />
        <link rel="stylesheet" href="css/schedule.css" />
    </head>
    <body>
        <div class="sidebar">
            <ul id="sidebar-list">
                <li onclick="location.href = 'dashboard'">Dashboard</li>
                <li onclick="location.href = 'profile'">My Profile</li>
                <li class="active">Schedule</li>
                <li onclick="location.href = 'roster'">Team Roster</li>
                <li onclick="location.href = 'locker-room'">Locker Room</li>
            </ul>
            <img id="logout-btn" src="logout-64.png" alt="Logout" />
        </div>

        <div class="main-content">
            <div class="top-bar">
                <img src="rugbiere-logo.png" alt="Efrei Rugby Logo" />
                <div class="title-group">
                    <h1>Team Schedule</h1>
                    <h4>
                        Pictures by &copy;
                        <a href="https://efreipicturestudio.fr/"
                            >Efrei Pictures Studio</a
                        >
                    </h4>
                </div>
            </div>

            <div class="schedule-layout">
                <div class="card" style="margin: 0">
                    <h3 style="margin-top: 0">Action Required</h3>
                    <div id="upcoming-events-list">
                        <p>Loading events...</p>
                    </div>
                </div>

                <div class="card" style="margin: 0">
                    <div class="calendar-header">
                        <button id="prev-month">&lt; Prev</button>
                        <h2
                            id="month-year-display"
                            class="section-title"
                            style="border: none"
                        >
                            Month Year
                        </h2>
                        <button id="next-month">Next &gt;</button>
                    </div>
                    <div class="calendar-days">
                        <div>Mon</div>
                        <div>Tue</div>
                        <div>Wed</div>
                        <div>Thu</div>
                        <div>Fri</div>
                        <div>Sat</div>
                        <div>Sun</div>
                    </div>
                    <div id="calendar-grid" class="calendar-grid"></div>
                </div>
            </div>
            <footer>
                <p>Copyright &copy; 2026 Carl Excoffier / Efrei Rugby.</p>
            </footer>
        </div>

        <div id="rsvp-modal" class="modal-overlay">
            <div class="modal-content">
                <span id="close-modal" class="close-modal">&times;</span>
                <h2 id="modal-title" class="modal-title">Event Title</h2>
                <p id="modal-details" class="modal-details">📅 Date @ Time</p>
                <div class="rsvp-buttons">
                    <button id="btn-attend" class="btn-yes">Attending</button>
                    <button id="btn-decline" class="btn-no">
                        Can't Make It
                    </button>
                </div>
            </div>
        </div>
        <script src="js/schedule.js"></script>
    </body>
</html>
